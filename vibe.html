<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Finder - Za3tar</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<section class="section">

<h2>Find Your Vibe 🔥</h2>

<div class="quiz-container">

  <div id="question">Question here</div>

  <div id="answers"></div>

  <button class="btn" onclick="nextQuestion()">Next</button>

</div>

<h3 id="result"></h3>

</section>

<script>

// QUESTIONS
const quiz = [
  {
    question: "Where are you going?",
    answers: [
      {text: "Street", vibe: "street"},
      {text: "Night Out", vibe: "night"}
    ]
  },
  {
    question: "Your style?",
    answers: [
      {text: "Chill", vibe: "chill"},
      {text: "Bold", vibe: "night"}
    ]
  },
  {
    question: "Favorite colors?",
    answers: [
      {text: "Dark", vibe: "street"},
      {text: "Light", vibe: "chill"}
    ]
  }
];

let current = 0;
let score = {
  street: 0,
  night: 0,
  chill: 0
};

let selected = null;

// LOAD QUESTION
function loadQuestion(){
  const q = quiz[current];
  document.getElementById("question").innerText = q.question;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach((a, index) => {
    const btn = document.createElement("button");
    btn.innerText = a.text;
    btn.classList.add("quiz-btn");

    btn.onclick = () => {
      selected = a.vibe;

      document.querySelectorAll(".quiz-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    };

    answersDiv.appendChild(btn);
  });
}

// NEXT QUESTION
function nextQuestion(){
  if(!selected){
    alert("Choose an answer first!");
    return;
  }

  score[selected]++;
  selected = null;
  current++;

  if(current < quiz.length){
    loadQuestion();
  } else {
    showResult();
  }
}

// SHOW RESULT
function showResult(){
  let vibe = "Street Vibe";

  if(score.night >= score.street && score.night >= score.chill){
    vibe = "Night Vibe 🌙";
  } else if(score.chill >= score.street){
    vibe = "Chill Vibe 😌";
  } else {
    vibe = "Street Vibe 🔥";
  }

  document.querySelector(".quiz-container").style.display = "none";
  document.getElementById("result").innerText = vibe;

  // OPTIONAL: redirect with category
  setTimeout(() => {
    window.location.href = "shop.html";
  }, 2500);
}

// INIT
loadQuestion();

</script>

</body>
</html>

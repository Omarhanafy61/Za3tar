<section class="section checkout">

<h2>Checkout</h2>

<div class="checkout-container">

<!-- FORM -->
<form class="checkout-form" onsubmit="placeOrder(event)">

<h3>Shipping Details</h3>
<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Address" required>
<input type="text" placeholder="City" required>
<input type="tel" placeholder="Phone Number" required>

<h3>Payment Method</h3>
<select id="payment" onchange="toggleCard()">
  <option value="cod">Cash on Delivery</option>
  <option value="card">Card Payment</option>
</select>

<!-- CARD -->
<div id="card-details" style="display:none;">
  <input type="text" placeholder="Card Number">
  <input type="text" placeholder="Expiry Date">
  <input type="text" placeholder="CVV">
</div>

<h3>Discount Code</h3>
<input type="text" id="discount" placeholder="Enter code">
<button type="button" onclick="applyDiscount()">Apply</button>

<br><br>
<button type="submit" class="btn">Place Order</button>

</form>

<!-- SUMMARY -->
<div class="order-summary">
  <h3>Your Order</h3>
  <ul id="checkout-items"></ul>
  <p>Discount: $<span id="discount-value">0</span></p>
  <p>Total: $<span id="checkout-total">0</span></p>
</div>

</div>
</section>

<script>

// NAV MENU
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}


// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let discountAmount = 0;

const list = document.getElementById("checkout-items");

cart.forEach(item => {
  const li = document.createElement("li");
  li.innerText = item.name + " - $" + item.price;
  list.appendChild(li);
  total += item.price;
});

document.getElementById("checkout-total").innerText = total;


// LOAD DISCOUNT FROM GAME
let savedCode = localStorage.getItem("discountCode");

if(savedCode){
  document.getElementById("discount").value = savedCode;
  applyDiscount();
}


// TOGGLE CARD
function toggleCard(){
  const method = document.getElementById("payment").value;

  document.getElementById("card-details").style.display =
    method === "card" ? "block" : "none";
}


// APPLY DISCOUNT
function applyDiscount(){
  const code = document.getElementById("discount").value;

  if(code === "ZA3TAR10"){
    discountAmount = total * 0.1;
  } 
  else if(code === "DRIP20"){
    discountAmount = total * 0.2;
  } 
  else {
    alert("Invalid code");
    return;
  }

  document.getElementById("discount-value").innerText = discountAmount.toFixed(2);
  document.getElementById("checkout-total").innerText = (total - discountAmount).toFixed(2);
}


// PLACE ORDER
function placeOrder(e){
  e.preventDefault();

  localStorage.removeItem("cart");
  localStorage.removeItem("discountCode");

  window.location.href = "confirmation.html";
}

</script>

</body>
</html>
